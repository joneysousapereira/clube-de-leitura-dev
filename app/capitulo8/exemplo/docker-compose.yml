services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clube-leitura-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - clube-leitura

  nginx:
    image: nginx:alpine
    container_name: clube-leitura-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - clube-leitura

  db:
    image: mysql:8.0
    platform: linux/arm64
    container_name: clube-leitura-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: clube_leitura
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - clube-leitura

volumes:
  dbdata:

networks:
  clube-leitura:
    driver: bridge
